<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Historique des fun facts</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <h1>📚 Historique</h1>
        <p>Tous les fun facts déjà envoyés.</p>
      </div>
      <a class="button" href="index.html">⬅️ Retour</a>
    </div>

    <div class="card fade-in">
      <div class="list" id="list">Chargement…</div>
    </div>

    <div class="footer">
      <span>💡 Astuce : ajoute tes nouveaux fun facts dans <code>facts.json</code></span>
      <span id="count"></span>
    </div>
  </div>

  <script>
    fetch('facts.json')
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById('list');
        list.innerHTML = "";
        data.slice().reverse().forEach(f => {
          const div = document.createElement('div');
          div.className = "item";
          div.innerHTML = `
            <h3>${f.date} — ${f.title}</h3>
            <p>${f.fact}</p>
          `;
          list.appendChild(div);
        });
        document.getElementById('count').textContent = `📌 ${data.length} fun fact(s)`;
      })
      .catch(() => {
        document.getElementById('list').textContent = "Impossible de charger l’historique.";
      });
  </script>
</body>
</html>
